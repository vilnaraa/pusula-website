backend:
  name: github
  repo: vilnaraa/pusula-website
  branch: main

local_backend: true
media_folder: assets/uploads
public_folder: assets/uploads
site_url: https://pusulamobil.com.tr
display_url: https://pusulamobil.com.tr
logo_url: /assets/app-icon.png

collections:
  - name: site
    label: Site Ayarları
    files:
      - name: site_content
        label: Genel Site İçeriği
        file: content/site.json
        format: json
        fields:
          - label: SEO
            name: seo
            widget: object
            fields:
              - { label: Sayfa Başlığı, name: title, widget: string }
              - { label: SEO Açıklaması, name: description, widget: text }
              - { label: Canonical URL, name: canonicalUrl, widget: string }
              - { label: Open Graph Başlığı, name: ogTitle, widget: string }
              - { label: Open Graph Açıklaması, name: ogDescription, widget: text }
              - { label: Open Graph Görseli, name: ogImage, widget: string }
              - { label: Tema Rengi, name: themeColor, widget: string }
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Başlık, name: title, widget: string }
              - { label: Alt Başlık, name: tagline, widget: string }
              - { label: Açıklama, name: lead, widget: text }
              - label: Birincil Buton
                name: primaryCta
                widget: object
                fields:
                  - { label: Metin, name: label, widget: string }
                  - { label: Bağlantı, name: href, widget: string }
              - label: İkincil Buton
                name: secondaryCta
                widget: object
                fields:
                  - { label: Metin, name: label, widget: string }
                  - { label: Bağlantı, name: href, widget: string }
          - label: Güven Şeridi
            name: trust
            widget: list
            fields:
              - { label: Etiket, name: label, widget: string }
              - { label: Değer, name: value, widget: string }
          - label: Ürün Bölümü
            name: product
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Başlık, name: title, widget: string }
              - { label: Açıklama, name: description, widget: text }
              - { label: Rozet, name: badge, widget: string }
              - label: Ürün Adımları
                name: highlights
                widget: list
                fields:
                  - { label: Numara, name: number, widget: string }
                  - { label: Başlık, name: title, widget: string }
                  - { label: Açıklama, name: description, widget: text }
          - label: Kart Bölümü
            name: cards
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Başlık, name: title, widget: string }
          - label: İlkeler
            name: principles
            widget: list
            fields:
              - { label: Numara, name: number, widget: string }
              - { label: Başlık, name: title, widget: string }
              - { label: Açıklama, name: description, widget: text }
          - label: Changelog Başlığı
            name: changelog
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Başlık, name: title, widget: string }
              - { label: Açıklama, name: description, widget: text }
          - label: Footer
            name: footer
            widget: object
            fields:
              - { label: Başlık, name: title, widget: string }
              - { label: Açıklama, name: description, widget: string }
              - { label: Yukarı Dön Metni, name: backToTopLabel, widget: string }

      - name: product_gallery
        label: Ürün Galerisi
        file: content/gallery.json
        format: json
        fields:
          - label: Slaytlar
            name: slides
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: Başlık, name: title, widget: string }
              - { label: Açıklama, name: description, widget: text }
              - { label: Görsel, name: image, widget: image }
              - { label: Alt Metin, name: alt, widget: string }
              - label: Maddeler
                name: points
                widget: list
                field: { label: Madde, name: point, widget: string }

  - name: changelog
    label: Changelog
    files:
      - name: changelog_entries
        label: Changelog Kayıtları
        file: data/changelog.json
        format: json
        fields:
          - { label: Son Güncelleme, name: updatedAt, widget: date, format: "YYYY-MM-DD" }
          - label: Kayıtlar
            name: entries
            widget: list
            summary: "v{{fields.version}} · {{fields.title}}"
            fields:
              - { label: Versiyon, name: version, widget: string }
              - { label: Tarih, name: date, widget: date, format: "YYYY-MM-DD" }
              - { label: Başlık, name: title, widget: string }
              - label: Tür
                name: type
                widget: select
                options:
                  - Yeni
                  - Geliştirme
                  - Tasarım
                  - Güvenlik
                  - Mimari
              - { label: Özet, name: summary, widget: text }
              - label: Eklendi
                name: added
                widget: list
                required: false
                field: { label: Madde, name: item, widget: string }
              - label: Değişti
                name: changed
                widget: list
                required: false
                field: { label: Madde, name: item, widget: string }
              - label: Kaldırıldı
                name: removed
                widget: list
                required: false
                field: { label: Madde, name: item, widget: string }
