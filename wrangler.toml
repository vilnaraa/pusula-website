name = "pusula-website"
compatibility_date = "2026-06-05"
main = "worker.js"
keep_vars = true

[vars]
NATAL_CHART_RATE_LIMIT = "12"
NATAL_CHART_RATE_LIMIT_WINDOW_SECONDS = "3600"
ACCOUNT_EMAIL_RATE_LIMIT = "30"
ACCOUNT_EMAIL_RATE_LIMIT_WINDOW_SECONDS = "3600"
PLUS_API_RATE_LIMIT = "60"
PLUS_API_RATE_LIMIT_WINDOW_SECONDS = "3600"
SUPABASE_USERS_TABLE = "pusula_users"

[[kv_namespaces]]
binding = "PUSULA_RATE_LIMIT_KV"
id = "a1405d12faf247d2b48eee619e32c0ff"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"
